<!DOCTYPE html>
<html lang="pt-BR">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width,initial-scale=1">
<title>Gravador de Áudio</title>
<style>
  *{box-sizing:border-box;margin:0;padding:0}
  body{background:#0b141a;font-family:'Segoe UI',sans-serif;display:flex;align-items:center;justify-content:center;height:100vh;overflow:hidden}
  .wrap{display:flex;flex-direction:column;align-items:center;gap:20px;padding:24px;width:100%}
  .timer{font-size:28px;font-weight:300;color:#e9edef;letter-spacing:4px;font-variant-numeric:tabular-nums;min-height:38px}
  .waveform{display:flex;align-items:center;gap:3px;height:48px;width:260px;justify-content:center}
  .bar{width:4px;border-radius:3px;background:#00a884;transition:height .08s;min-height:4px}
  .controls{display:flex;align-items:center;gap:16px;margin-top:4px}
  .btn{border:none;cursor:pointer;border-radius:50%;display:flex;align-items:center;justify-content:center;transition:opacity .15s,transform .1s;outline:none}
  .btn:active{transform:scale(.93)}
  .btn-cancel{width:48px;height:48px;background:rgba(255,255,255,.12);color:#e9edef;font-size:20px}
  .btn-record{width:64px;height:64px;background:#f02849;font-size:28px}
  .btn-stop{width:64px;height:64px;background:#00a884;font-size:24px}
  .btn-send{width:48px;height:48px;background:#00a884;color:#fff;font-size:20px}
  .status{font-size:13px;color:#8696a0;text-align:center;min-height:18px}
  .preview{width:100%;max-width:280px}
  audio{width:100%;outline:none;height:36px;border-radius:8px}
  .hidden{display:none!important}
</style>
</head>
<body>
<div class="wrap">
  <div class="timer" id="timer">0:00</div>
  <div class="waveform" id="waveform"></div>
  <div class="controls">
    <button class="btn btn-cancel hidden" id="btnCancel" title="Cancelar">✕</button>
    <button class="btn btn-record" id="btnRecord" title="Gravar">🎤</button>
    <button class="btn btn-stop hidden" id="btnStop" title="Parar">⏹</button>
    <button class="btn btn-send hidden" id="btnSend" title="Enviar">▶</button>
  </div>
  <div class="preview hidden" id="preview">
    <audio id="audioPreview" controls></audio>
  </div>
  <div class="status" id="status">Toque no microfone para gravar</div>
</div>

<script>
var recorder=null, stream=null, chunks=[], blob=null;
var timerEl=document.getElementById('timer');
var waveEl=document.getElementById('waveform');
var statusEl=document.getElementById('status');
var btnRecord=document.getElementById('btnRecord');
var btnStop=document.getElementById('btnStop');
var btnCancel=document.getElementById('btnCancel');
var btnSend=document.getElementById('btnSend');
var preview=document.getElementById('preview');
var audioPreview=document.getElementById('audioPreview');
var timerInt=null, analyser=null, animFrame=null, startTime=0;

// cria 30 barras no waveform
for(var i=0;i<30;i++){var b=document.createElement('div');b.className='bar';b.style.height='4px';waveEl.appendChild(b);}
var bars=waveEl.querySelectorAll('.bar');

function fmtTimer(s){s=Math.floor(s);return Math.floor(s/60)+':'+(s%60<10?'0':'')+s%60;}

function startTimer(){
  startTime=Date.now();
  timerInt=setInterval(function(){
    timerEl.textContent=fmtTimer((Date.now()-startTime)/1000);
  },200);
}
function stopTimer(){clearInterval(timerInt);timerEl.textContent='0:00';}

function animWave(){
  if(!analyser) return;
  var buf=new Uint8Array(analyser.frequencyBinCount);
  analyser.getByteFrequencyData(buf);
  var step=Math.floor(buf.length/30);
  for(var i=0;i<30;i++){
    var v=buf[i*step]||0;
    var h=Math.max(4,Math.round((v/255)*44));
    bars[i].style.height=h+'px';
    bars[i].style.opacity=0.4+(v/255)*0.6;
  }
  animFrame=requestAnimationFrame(animWave);
}
function resetBars(){ for(var i=0;i<30;i++){ bars[i].style.height='4px'; bars[i].style.opacity='1'; } }

function show(ids,hideOthers){
  ['btnRecord','btnStop','btnCancel','btnSend','preview'].forEach(function(id){
    document.getElementById(id).classList.toggle('hidden', ids.indexOf(id)<0);
  });
}

btnRecord.onclick=function(){
  navigator.mediaDevices.getUserMedia({audio:true}).then(function(s){
    stream=s;
    var ctx=new AudioContext();
    var src=ctx.createMediaStreamSource(s);
    analyser=ctx.createAnalyser(); analyser.fftSize=64;
    src.connect(analyser);
    recorder=new MediaRecorder(s,{mimeType:MediaRecorder.isTypeSupported('audio/webm;codecs=opus')?'audio/webm;codecs=opus':'audio/webm'});
    chunks=[];
    recorder.ondataavailable=function(e){if(e.data.size>0) chunks.push(e.data);};
    recorder.onstop=function(){
      blob=new Blob(chunks,{type:recorder.mimeType||'audio/webm'});
      audioPreview.src=URL.createObjectURL(blob);
      show(['btnCancel','btnSend','preview']);
      statusEl.textContent='Ouça antes de enviar';
      resetBars(); cancelAnimationFrame(animFrame);
    };
    recorder.start(100);
    startTimer(); animWave();
    show(['btnCancel','btnStop']);
    statusEl.textContent='Gravando…';
  }).catch(function(e){
    statusEl.textContent='Microfone não permitido: '+e.message;
  });
};

btnStop.onclick=function(){
  if(recorder&&recorder.state==='recording'){recorder.stop();}
  stopTimer();
  if(stream) stream.getTracks().forEach(function(t){t.stop();});
};

btnCancel.onclick=function(){
  if(recorder&&recorder.state==='recording'){recorder.stop();}
  stopTimer(); resetBars(); cancelAnimationFrame(animFrame);
  if(stream) stream.getTracks().forEach(function(t){t.stop();});
  blob=null; chunks=[];
  timerEl.textContent='0:00';
  show(['btnRecord']);
  statusEl.textContent='Toque no microfone para gravar';
  // avisa o pai que cancelou
  window.parent.postMessage({type:'wa_audio_cancel'},'*');
};

btnSend.onclick=function(){
  if(!blob) return;
  var reader=new FileReader();
  reader.onload=function(e){
    var base64=e.target.result.split(',')[1];
    window.parent.postMessage({
      type:'wa_audio_ready',
      data:base64,
      mime:blob.type||'audio/webm',
      filename:'audio_'+Date.now()+'.webm'
    },'*');
    // reset
    stopTimer(); resetBars(); cancelAnimationFrame(animFrame);
    blob=null; chunks=[];
    timerEl.textContent='0:00';
    show(['btnRecord']);
    statusEl.textContent='Enviado! Grave outro se quiser.';
  };
  reader.readAsDataURL(blob);
};
</script>
</body>
</html>
